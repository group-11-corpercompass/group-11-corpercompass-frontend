<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checklist</title>
  <link rel="stylesheet" href="Checklist.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<script src="checklist.js" defer></script>
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2 class="logo">CorperCompass </h2>
  <ul>
      <li><i class="fa-solid fa-house"></i>Dashboard</li>
      <li><i class="fa-solid fa-earth-africa"></i>Map</li>
      <li><i class="fa-solid fa-book-open"></i>Culture Guide</li>
      <li><i class="fa-solid fa-house"></i>Housing</li>
      <li class="active"> <i class="fa-regular fa-rectangle-list"></i>Checklist</li>
      <li> <i class="fa-solid fa-wallet"></i>Budget Tracker</li>
<hr>
<li><i class="fa-solid fa-user"></i>Profile</li>
      <li><i class="fa-solid fa-gear"></i>Settings</li>
    </ul>
  </aside>

  <!-- Main Content -->
  <div class="content">

    <!-- Top Bar -->
    <div class="topbar">
<span class="menu-toggle" id="menuToggle">☰</span>
      <input type="text" placeholder="Search..." class="search">

      <input type="text" placeholder="Search..." class="search">

      <div class="top-right">
        🔔
        <div class="profile">
          <img src="https://i.pravatar.cc/40" alt="">
          <span>Adaeze Okonkwo</span>
        </div>
      </div>
    </div>

    <!-- Main Grid -->
    <div class="main-grid">

      <!-- Left Section -->
      <div class="left">

        <h1>Welcome back, Adaeze 👋</h1>
        <p>Here’s what you’ve achieved so far</p>

        <!-- Completed -->
        <div class="card">
          <h3>Tasks Completed</h3>
          <ul id="completedTasks"></ul>
        </div>

        <!-- Upcoming -->
        <div class="card">
          <h3>Upcoming Tasks</h3>
          <ul id="upcomingTasks"></ul>
        </div>

        <button id="addTask">Add Custom Task</button>

      </div>

      <!-- Right Section -->
      <div class="right">

        <div class="progress-card">
          <h3>Task Completed Progress</h3>

          <div class="progress-circle">
            <span id="progressText">65%</span>
          </div>
        </div>

        <button class="share-btn">📤 Share your Progress</button>

  </div>

    </div>

  </div>

</div>
</body>
  </html>
