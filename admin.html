<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorperCompass - Admin Panel</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav></nav>
    <main>
        <h1>Admin Panel</h1>
        <div class="tabs">
            <button class="tab-btn active" data-tab="areas">Areas</button>
            <button class="tab-btn" data-tab="lodges">Lodges</button>
            <button class="tab-btn" data-tab="culture">Cultural Content</button>
            <button class="tab-btn" data-tab="users">Users</button>
        </div>
        <div id="areas-tab" class="tab-content active">
            <h2>Manage Areas</h2>
            <form id="area-form" class="card">
                <h3>Add/Edit Area</h3>
                <input type="hidden" id="area-id">
                <div><label>Name:</label><input type="text" id="area-name" required></div>
                <div><label>State:</label><input type="text" id="area-state" required></div>
                <div><label>Rent Min:</label><input type="number" id="area-rent-min"></div>
                <div><label>Rent Max:</label><input type="number" id="area-rent-max"></div>
                <div><label>Transport Notes:</label><textarea id="area-transport"></textarea></div>
                <div><label>Safety Notes:</label><textarea id="area-safety"></textarea></div>
                <div><label>Lifestyle Notes:</label><textarea id="area-lifestyle"></textarea></div>
                <div><label>Latitude:</label><input type="number" step="any" id="area-lat"></div>
                <div><label>Longitude:</label><input type="number" step="any" id="area-lng"></div>
                <button type="submit" class="btn">Save Area</button>
            </form>
            <div id="areas-list" class="card">
                <h3>Existing Areas</h3>
                <ul></ul>
            </div>
        </div>
        <div id="lodges-tab" class="tab-content">
            <h2>Manage Lodges</h2>
            <form id="lodge-form" class="card">
                <h3>Add/Edit Lodge</h3>
                <input type="hidden" id="lodge-id">
                <div><label>Name:</label><input type="text" id="lodge-name" required></div>
                <div><label>Area (ID):</label><input type="text" id="lodge-area-id" required placeholder="Area ObjectId"></div>
                <div><label>Price Min:</label><input type="number" id="lodge-price-min"></div>
                <div><label>Price Max:</label><input type="number" id="lodge-price-max"></div>
                <div><label>Public Contact:</label><input type="text" id="lodge-contact"></div>
                <div><label>Notes:</label><textarea id="lodge-notes"></textarea></div>
                <div><label>Latitude:</label><input type="number" step="any" id="lodge-lat"></div>
                <div><label>Longitude:</label><input type="number" step="any" id="lodge-lng"></div>
                <div><label>Active:</label><input type="checkbox" id="lodge-active" checked></div>
                <button type="submit" class="btn">Save Lodge</button>
            </form>
            <div id="lodges-list" class="card">
                <h3>Existing Lodges</h3>
                <ul></ul>
            </div>
        </div>
        <div id="culture-tab" class="tab-content">
            <h2>Manage Cultural Content</h2>
            <form id="culture-content-form" class="card">
                <h3>Add/Edit Content</h3>
                <input type="hidden" id="culture-id">
                <div><label>Title:</label><input type="text" id="culture-title" required></div>
                <div><label>Category:</label>
                    <select id="culture-category" required>
                        <option value="Food">Food</option>
                        <option value="Festivals">Festivals</option>
                        <option value="Language">Language</option>
                        <option value="Customs">Customs</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div><label>State:</label><input type="text" id="culture-state"></div>
                <div><label>Content:</label><textarea id="culture-content" rows="6" required></textarea></div>
                <button type="submit" class="btn">Save Content</button>
            </form>
            <div id="culture-list" class="card">
                <h3>Existing Content</h3>
                <ul></ul>
            </div>
        </div>
        <div id="users-tab" class="tab-content">
            <h2>User Management</h2>
            <div id="users-list" class="card">
                <ul></ul>
            </div>
        </div>
    </main>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
