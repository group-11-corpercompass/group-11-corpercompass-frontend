<!DOCTYPE html>

<title>Layout</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <!-- Full Width Top -->

        <h2>Container One</h2>

        <div class="list">
            <div class="item">
                <h4>Item One</h4>
                <p>Description text here</p>
            </div>

            <div class="divider"></div>

            <div class="item">
                <h4>Item Two</h4>
                <p>Description text here</p>
            </div>

            <div class="divider"></div>

            <div class="item">
                <h4>Item Three</h4>
                <p>Description text here</p>
            </div>
        </div>
    </div>


    <!-- Grid Containers -->
    <div class="card">Grid Two</div>
    <div class="card">Grid Three</div>
    <div class="card">Grid Four</div>
    <div class="card">Grid Five</div>


    <!-- Full Width Bottom -->

        <h2>Container Six</h2>

        <div class="list">
            <div class="item">
                <h4>Item One</h4>
                <p>Description text here</p>
            </div>

                <h4>Item Two</h4>

            </div>

            <div class="divider"></div>

            <div class="item">
                <h4>Item Three</h4>

            </div>
        </div>
    </div>

</div>

</html>
