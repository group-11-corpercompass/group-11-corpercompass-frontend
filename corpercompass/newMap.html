<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Map</title>
    <link rel="stylesheet" href="newMap.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    ></script>
    <script
      src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="newApi.js" defer></script>
  </head>
  <body>
    <main>
      <h1>Interactive Map</h1>
      <div class="controls">
        <button id="show-markers" class="btn">Show Markers</button>
        <button id="show-heatmap" class="btn">Show Heatmap</button>
        <button id="clear-overlay" class="btn">Clear Overlays</button>
      </div>

      <div id="map"></div>
    </main>
  </body>
</html>
