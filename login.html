<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="/css/login.css" />
    <link
      type="image/png"
      sizes="16x16"
      rel="icon"
      href="assets/images/icons8-google-color-16.png"
    />
    <meta
      name="msapplication-square70x70logo"
      content="assets/images/icons8-google-color-70.png"
    />
    <meta
      name="msapplication-TileImage"
      content="assets/images/icons8-google-color-144.png"
    />
    <meta
      name="msapplication-square150x150logo"
      content="assets/images/icons8-google-color-150.png"
    />
    <meta
      name="msapplication-square310x310logo"
      content="assets/images/icons8-google-color-310.png"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="assets/css/login.css">
    <script src="assets/js/login.js" defer></script>

  </head>
  <body>
    <div class="container" id="logIn">
      <div class="image-container">
        <img src="assets/images/Image copper.png" alt="" />
      </div>

      <div class="form-container">
        <div class="form-title">
          <h1>Welcome Back to Corper Compass</h1>
          <p>Join CorperCompass to relocate confidently</p>
        </div>

        <form class="form-section">
          <div class="form-group">
            <input type="email" placeholder="@email.com" required />
            <div class="form-group-icon"><i class="fa fa-envelope-o"></i></div>
          </div>
          <div class="form-group">
            <input type="password" placeholder="Password" required />
            <div class="form-group-icon"><i class="fa fa-lock"></i></div>
          </div>

          <div class="recovery">
            <a href="">Forgot Password?</a>
            <label for=""><input type="checkbox" /> Remeber Me</label>
          </div>
          <button class="btn" type="submit">Login</button>

          -------- or --------

          <button class="sign-up-btn" type="submit">
            <img
              width="15"
              height="12"
              src="https://img.icons8.com/color/48/google-logo.png"
              alt="google-logo"
            />
            Continue with Google
          </button>

          <div class="log-in-btn">
            <p>
              Don't have an account?
              <a href="register.html" id="signUpButton">SignUp</a>
            </p>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
