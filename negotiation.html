<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorperCompass - Negotiations</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav></nav>
    <main>
        <h1>Negotiations</h1>
        <div id="negotiations-container" class="grid"></div>
        <div id="negotiation-detail" style="display: none;">
            <h2>Negotiation Details</h2>
            <div id="negotiation-content"></div>
            <form id="negotiation-message-form">
                <input type="text" id="neg-message" placeholder="Add a message">
                <button type="submit">Send</button>
            </form>
            <button id="close-detail" class="btn">Close</button>
        </div>
    </main>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
