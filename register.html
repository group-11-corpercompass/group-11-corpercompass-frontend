<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="stylesheet" href="/css/login.css">
    <link type="image/png" sizes="16x16" rel="icon" href=".../icons8-google-color-16.png"> <meta name="msapplication-square70x70logo" content=".../icons8-google-color-70.png"> <meta name="msapplication-TileImage" content=".../icons8-google-color-144.png"> <meta name="msapplication-square150x150logo" content=".../icons8-google-color-150.png"> <meta name="msapplication-square310x310logo" content=".../icons8-google-color-310.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>
    <link rel="stylesheet" href="assets/css/login.css">
    <script src="js/register.js" defer></script>
</head>
<body>

    <div class="container" id="signUp"  >
        <div class="image-container">
            <img src="/assets/images/Image copper.png" alt="">
            
        </div>
        
                <div class="form-container" >
                    <div class="form-title">
                        <h1>Create Your account</h1>
                        <p>Join CorperCompass to relocate confidently</p>
                    </div>
            
                    <form class="form-section" id="form-section">
                        <div class="form-group">
                            <input class="reg-input-name" id="name" type="text" placeholder="Name" required>
                        </div>
                        <div class="form-group"> 
                            <input class="reg-input" type="email" id="email" placeholder="@email.com" required>
                            <div class="form-group-icon reg-icon"> <i class="fa fa-envelope-o"></i></div>
            
                        </div>
                        <div class="form-group">
                            <input type="password" id="password" placeholder="Password" required>
                            <div class="form-group-icon"> <i class="fa fa-lock"></i></div>
                        </div>
                        <div class="form-group">
                            <input type="password" placeholder="Confirm Password" required>
                            <div class="form-group-icon"> <i class="fa fa-lock"></i></div>
                        </div>
            
                        
                        <button class="btn" type="submit">Create Account</button>
                           
                            -------- or --------
                        
                            
                            <button class="sign-up-btn" type="submit">
                                <img width="15" height="12" src="https://img.icons8.com/color/48/google-logo.png" alt="google-logo"/> Signup with Google
                            </button>
                    
                           <div class="log-in-btn" >
                            <p>Have an account? <a href="login.html" id="logInButton">LogIn</a></p>
                            <p id="error"></p>
                           </div>
                        
                        
            
            
                        
            
                    </form>
            
            
                </div>
       
    </div>
    
   

    
</body>
</html>
